<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok Contexto</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#fe2c55">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contexto">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--surface:#12121c;--surface2:#1a1a28;--border:#252535;
    --text:#eeeef4;--text2:#8888a0;--pink:#fe2c55;--orange:#ff6f3c;
    --green:#00c853;--gold:#ffd740;--cyan:#00e5ff;
    --gradient:linear-gradient(135deg,var(--pink),var(--orange));
    --radius:12px;
  }
  html,body{height:100%;overflow:hidden}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

  /* ── Header ── */
  .header{background:var(--gradient);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 20px rgba(254,44,85,.25)}
  .logo{font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:1px}
  .live-badge{background:rgba(0,0,0,.35);color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:4px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:1px}
  .live-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:#555;transition:all .3s}
  .conn-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green)}
  .conn-label{font-size:.7rem;color:rgba(255,255,255,.8)}
  .gear-btn{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;opacity:.8;transition:opacity .2s;padding:4px}
  .gear-btn:hover{opacity:1}

  /* ── Info bar ── */
  .info-bar{display:flex;gap:6px;padding:8px 16px;flex-shrink:0;flex-wrap:wrap;align-items:center}
  .info-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.7rem;color:var(--text2);display:flex;align-items:center;gap:4px;white-space:nowrap}
  .info-chip .val{color:var(--text);font-weight:700}
  .info-chip.timer .val{color:var(--cyan)}
  .info-chip.last-word .val{color:var(--gold)}

  /* ── Word Display ── */
  .word-section{padding:12px 16px;flex-shrink:0}
  .word-box{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center}
  .word-label{font-size:.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
  .word-blanks{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
  .letter-slot{width:36px;height:44px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:var(--cyan);font-family:monospace;transition:all .3s}
  .letter-slot.revealed{border-color:var(--gold);color:var(--gold);background:rgba(255,215,64,.08)}
  .word-meta{margin-top:8px;font-size:.7rem;color:var(--text2);display:flex;justify-content:center;gap:14px}

  /* ── Leaderboard ── */
  .lb-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 16px 16px}
  .lb-header{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding-bottom:8px;flex-shrink:0}
  .lb-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:flex;flex-direction:column;gap:6px}
  .lb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .lb-item.top-1{border-color:rgba(255,215,64,.4);background:linear-gradient(135deg,rgba(255,215,64,.08),rgba(255,215,64,.02))}
  .lb-item.top-2{border-color:rgba(192,192,192,.3);background:rgba(192,192,192,.04)}
  .lb-item.top-3{border-color:rgba(205,127,50,.3);background:rgba(205,127,50,.04)}
  .lb-pos{font-size:.75rem;font-weight:800;min-width:24px;text-align:center;color:var(--text2)}
  .top-1 .lb-pos{color:var(--gold)}
  .top-2 .lb-pos{color:#c0c0c0}
  .top-3 .lb-pos{color:#cd7f32}
  .lb-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);object-fit:cover;flex-shrink:0;border:2px solid var(--border)}
  .top-1 .lb-avatar{border-color:var(--gold)}
  .top-2 .lb-avatar{border-color:#c0c0c0}
  .top-3 .lb-avatar{border-color:#cd7f32}
  .lb-details{flex:1;min-width:0}
  .lb-username{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-handle{font-size:.6rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-word-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;color:var(--text);text-align:center;min-width:70px}
  .lb-score{font-size:.7rem;font-weight:800;min-width:32px;text-align:right;padding:3px 8px;border-radius:4px}
  .lb-score.hot{color:#ff0050;background:rgba(255,0,80,.1)}
  .lb-score.warm{color:#ff6b35;background:rgba(255,107,53,.1)}
  .lb-score.cool{color:#0088ff;background:rgba(0,136,255,.1)}
  .lb-score.cold{color:var(--text2);background:var(--surface2)}
  .lb-empty{text-align:center;color:var(--text2);padding:40px 10px;font-size:.85rem}

  /* ── Settings Modal ── */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.active{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:360px;animation:slideIn .25s ease}
  .modal-title{font-size:1rem;font-weight:800;margin-bottom:16px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .modal-group{margin-bottom:14px}
  .modal-label{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .modal-row{display:flex;gap:6px}
  .modal-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:.85rem;outline:none}
  .modal-input:focus{border-color:var(--pink)}
  .modal-input::placeholder{color:var(--text2)}
  .btn{padding:8px 16px;border:none;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
  .btn:active{transform:scale(.96)}
  .btn-primary{background:var(--gradient);color:#fff}
  .btn-danger{background:#cc2244;color:#fff}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-gold{background:var(--gold);color:#000}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .modal-actions{display:flex;gap:6px;flex-wrap:wrap}
  .modal-actions .btn{flex:1;min-width:0}
  .modal-status{font-size:.7rem;color:var(--text2);margin-top:6px;text-align:center}
  .modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer}
  .modal{position:relative}

  /* ── Winner overlay ── */
  .winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;padding:20px}
  .winner-overlay.active{display:flex}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:1001}
  .winner-card{background:var(--surface);border:2px solid var(--gold);border-radius:20px;padding:30px 40px;text-align:center;animation:bounceIn .5s ease;box-shadow:0 0 80px rgba(255,215,64,.15);max-width:420px;width:100%;z-index:1002}
  @keyframes bounceIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .w-trophy{font-size:3rem;margin-bottom:6px}
  .w-title{font-size:1.4rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .w-word{font-size:2.4rem;font-weight:900;color:var(--gold);margin:12px 0;letter-spacing:2px;text-transform:uppercase}
  .w-player-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0}
  .w-player-avatar{width:44px;height:44px;border-radius:50%;border:3px solid var(--gold);object-fit:cover;background:var(--surface2)}
  .w-player-info{text-align:left}
  .w-player-name{font-size:1rem;font-weight:700}
  .w-player-user{font-size:.75rem;color:var(--text2)}
  .w-stats{font-size:.75rem;color:var(--text2);margin-top:6px}
  .w-countdown{font-size:.85rem;font-weight:700;color:var(--cyan);margin-top:12px}
  .w-session{margin-top:14px}
  .w-session-title{font-size:.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .w-session-list{display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto}
  .w-session-item{display:flex;align-items:center;gap:6px;font-size:.7rem;padding:3px 8px;background:var(--surface2);border-radius:6px}
  .w-session-item img{width:18px;height:18px;border-radius:50%;object-fit:cover}
  .w-session-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .w-session-item .pts{color:var(--cyan);font-weight:700}

  /* ── Responsive ── */
  @media(max-width:500px){
    .word-section{padding:8px 12px}
    .info-bar{padding:6px 12px}
    .lb-wrap{padding:0 12px 12px}
    .letter-slot{width:28px;height:36px;font-size:1rem}
    .word-box{padding:14px 10px}
    .header{padding:8px 12px}
    .lb-item{padding:8px 10px;gap:8px}
    .lb-avatar{width:30px;height:30px}
    .lb-word-badge{min-width:56px;font-size:.7rem;padding:3px 8px}
  }
  @media(max-width:360px){
    .letter-slot{width:22px;height:28px;font-size:.85rem;border-radius:5px}
    .word-blanks{gap:3px}
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">CONTEXTO</span>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="header-right">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-label" id="connLabel">Disconnected</span>
    <button class="gear-btn" onclick="toggleSettings()">&#9881;</button>
  </div>
</div>

<!-- Info bar -->
<div class="info-bar">
  <div class="info-chip"><span>Guesses</span> <span class="val" id="statGuesses">0</span></div>
  <div class="info-chip"><span>Words</span> <span class="val" id="statWords">0</span></div>
  <div class="info-chip"><span>Players</span> <span class="val" id="statPlayers">0</span></div>
  <div class="info-chip last-word"><span>Last</span> <span class="val" id="lastWordChip">-</span></div>
  <div class="info-chip timer" id="timerChip" style="display:none"><span class="val" id="timerVal"></span></div>
</div>

<!-- Word display -->
<div class="word-section">
  <div class="word-box">
    <div class="word-label">Guess the Secret Word</div>
    <div class="word-blanks" id="wordBlanks"></div>
    <div class="word-meta">
      <span id="wordLetterCount"></span>
      <span id="hintCount" style="display:none"></span>
    </div>
  </div>
</div>

<!-- Leaderboard -->
<div class="lb-wrap">
  <div class="lb-header">Top 10 Guesses</div>
  <div class="lb-list" id="lbList">
    <div class="lb-empty">Waiting for guesses...</div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <button class="modal-close" onclick="toggleSettings()">&times;</button>
    <div class="modal-title">Settings</div>

    <div class="modal-group">
      <div class="modal-label">TikTok Username</div>
      <div class="modal-row">
        <input class="modal-input" type="text" id="usernameInput" placeholder="username" autocomplete="off"
          onkeydown="if(event.key==='Enter')doConnect()">
      </div>
      <div class="modal-actions" style="margin-top:6px">
        <button class="btn btn-primary" id="connectBtn" onclick="doConnect()">Connect</button>
        <button class="btn btn-danger" id="disconnectBtn" onclick="doDisconnect()" disabled>Disconnect</button>
      </div>
      <div class="modal-status" id="connStatus">Not connected</div>
    </div>

    <div class="modal-group">
      <div class="modal-label">Game Controls</div>
      <div class="modal-actions">
        <button class="btn btn-gold" onclick="sendHint()">Hint</button>
        <button class="btn btn-secondary" onclick="skipRound()">Skip Word</button>
      </div>
    </div>

    <div class="modal-group">
      <div class="modal-label">Test Guess</div>
      <div class="modal-row">
        <input class="modal-input" type="text" id="manualInput" placeholder="player:word" autocomplete="off"
          onkeydown="if(event.key==='Enter')sendManual()">
        <button class="btn btn-primary" onclick="sendManual()">Go</button>
      </div>
    </div>
  </div>
</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winnerOverlay">
  <canvas id="confetti"></canvas>
  <div class="winner-card">
    <div class="w-trophy">&#127942;</div>
    <div class="w-title">WORD FOUND!</div>
    <div class="w-word" id="winnerWord">-</div>
    <div class="w-player-row">
      <img class="w-player-avatar" id="winnerAvatar" src="" alt="">
      <div class="w-player-info">
        <div class="w-player-name" id="winnerNickname">-</div>
        <div class="w-player-user" id="winnerUsername">-</div>
      </div>
    </div>
    <div class="w-stats">after <strong id="winnerGuessCount">0</strong> guesses</div>
    <div class="w-countdown" id="winnerCountdown"></div>
    <div class="w-session" id="winnerSession"></div>
    <button class="btn btn-secondary" style="margin-top:14px" onclick="closeWinner()">Skip to Next</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────
let wordLength = 0;
let revealedHints = {};
let lastGuessedWord = '-';
const playerCache = {};

// ── WebSocket ────────────────────────────────────────────────────────────
const WS_URL = window.location.hostname === 'localhost'
  ? 'ws://localhost:8080'
  : `wss://${window.location.host}`;
let ws = null, reconnTimer = null;

function wsConnect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => clearTimeout(reconnTimer);
  ws.onclose = () => { reconnTimer = setTimeout(wsConnect, 2000); };
  ws.onerror = () => {};
  ws.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch(er) { console.error(er); } };
}
function wsSend(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }

// ── Message handler ──────────────────────────────────────────────────────
let countdownInterval = null;

function handle(msg) {
  switch (msg.type) {
    case 'init':
      setConn(msg.connected, msg.username);
      updateStats(msg.stats);
      renderLB(msg.leaderboard);
      setWord(msg.wordLength);
      break;
    case 'status':
      if (msg.status === 'connecting') {
        el('connDot').classList.remove('connected');
        el('connLabel').textContent = 'Connecting...';
        el('connStatus').textContent = 'Connecting...';
        el('connectBtn').disabled = true;
        el('disconnectBtn').disabled = true;
      } else {
        setConn(msg.status === 'connected', msg.username);
      }
      break;
    case 'error':
      el('connStatus').textContent = msg.message;
      setConn(false);
      break;
    case 'comment':
      cachePlayer(msg.username, msg.nickname, msg.profilePic);
      if (/^[a-zA-Z]{2,20}$/.test(msg.comment.trim())) {
        wsSend({ action:'guess', word:msg.comment.trim(), player:msg.username, nickname:msg.nickname, profilePic:msg.profilePic });
      }
      break;
    case 'guess':
      updateStats(msg.stats);
      renderLB(msg.leaderboard);
      cachePlayer(msg.entry.player, msg.entry.nickname, msg.entry.profilePic);
      lastGuessedWord = msg.entry.word;
      el('lastWordChip').textContent = msg.entry.word;
      break;
    case 'duplicate':
      break;
    case 'hint':
      showHint(msg.hint, msg.revealed, msg.total);
      break;
    case 'winner':
      cachePlayer(msg.player, null, null);
      showWinner(msg);
      break;
    case 'newRound':
      clearInterval(countdownInterval);
      hideTimer();
      el('winnerOverlay').classList.remove('active');
      updateStats(msg.stats);
      renderLB(msg.leaderboard);
      setWord(msg.wordLength);
      revealedHints = {};
      lastGuessedWord = '-';
      el('lastWordChip').textContent = '-';
      break;
    case 'maxGuesses':
      break;
    case 'gift':
      cachePlayer(msg.username, msg.nickname, msg.profilePic);
      break;
  }
}

function cachePlayer(username, nickname, pic) {
  if (!username) return;
  if (!playerCache[username]) playerCache[username] = {};
  if (nickname) playerCache[username].nickname = nickname;
  if (pic) playerCache[username].profilePic = pic;
}
function getPlayer(username) {
  return playerCache[username] || { nickname: username, profilePic: '' };
}

// ── Helpers ──────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function setConn(on, user) {
  el('connDot').classList.toggle('connected', on);
  el('connLabel').textContent = on ? `@${user}` : 'Disconnected';
  el('connectBtn').disabled = on;
  el('disconnectBtn').disabled = !on;
  el('connStatus').textContent = on ? `Connected to @${user}` : 'Not connected';
  if (on && user) el('usernameInput').value = user;
}

function doConnect() {
  const username = el('usernameInput').value.trim();
  if (!username) return;
  wsSend({ action: 'connect', username });
}

function doDisconnect() {
  wsSend({ action: 'disconnect' });
}

function updateStats(s) {
  if (!s) return;
  el('statGuesses').textContent = s.totalGuesses;
  el('statWords').textContent = s.uniqueWords;
  el('statPlayers').textContent = s.players;
}

// ── Timer ────────────────────────────────────────────────────────────────
function showTimer(seconds) {
  const chip = el('timerChip');
  const val = el('timerVal');
  chip.style.display = 'flex';
  let rem = seconds;
  val.textContent = `${rem}s`;
  clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    rem--;
    if (rem <= 0) { clearInterval(countdownInterval); hideTimer(); }
    else val.textContent = `${rem}s`;
  }, 1000);
}

function hideTimer() {
  el('timerChip').style.display = 'none';
  clearInterval(countdownInterval);
}

// ── Settings modal ──────────────────────────────────────────────────────
function toggleSettings() {
  el('settingsModal').classList.toggle('active');
}
// Close on backdrop click
el('settingsModal').addEventListener('click', (e) => {
  if (e.target === el('settingsModal')) toggleSettings();
});

// ── Word blanks ──────────────────────────────────────────────────────────
function setWord(len) {
  wordLength = len || 0;
  const wrap = el('wordBlanks');
  wrap.innerHTML = '';
  for (let i = 0; i < wordLength; i++) {
    const slot = document.createElement('div');
    slot.className = 'letter-slot';
    slot.id = `slot-${i}`;
    slot.textContent = revealedHints[i] || '';
    if (revealedHints[i]) slot.classList.add('revealed');
    wrap.appendChild(slot);
  }
  el('wordLetterCount').textContent = wordLength ? `${wordLength} letters` : '';
  el('hintCount').style.display = 'none';
}

function showHint(hint, revealed, total) {
  const letters = hint.split(' ');
  letters.forEach((ch, i) => {
    if (ch !== '_') {
      revealedHints[i] = ch;
      const slot = el(`slot-${i}`);
      if (slot) { slot.textContent = ch.toUpperCase(); slot.classList.add('revealed'); }
    }
  });
  const hc = el('hintCount');
  hc.textContent = `${revealed}/${total} revealed`;
  hc.style.display = 'inline-flex';
}

// ── Leaderboard (top 10, sorted by rank) ────────────────────────────────
function scoreClass(rank) {
  if (rank <= 50) return 'hot';
  if (rank <= 200) return 'warm';
  if (rank <= 500) return 'cool';
  return 'cold';
}

function renderLB(lb) {
  const list = el('lbList');
  if (!lb || !lb.length) {
    list.innerHTML = '<div class="lb-empty">Waiting for guesses...</div>';
    return;
  }

  const top10 = lb.slice(0, 10);

  list.innerHTML = top10.map((e, i) => {
    const p = getPlayer(e.player);
    const pic = p.profilePic || e.profilePic || '';
    const name = p.nickname || e.nickname || e.player;
    const topCls = i < 3 ? ` top-${i+1}` : '';
    const sc = scoreClass(e.rank);
    return `<div class="lb-item${topCls}">
      <div class="lb-pos">${i+1}</div>
      ${pic ? `<img class="lb-avatar" src="${esc(pic)}" alt="" onerror="this.style.display='none'">` : '<div class="lb-avatar"></div>'}
      <div class="lb-details">
        <div class="lb-username">${esc(name)}</div>
        <div class="lb-handle">@${esc(e.player)}</div>
      </div>
      <div class="lb-word-badge">${esc(e.word)}</div>
      <div class="lb-score ${sc}">#${e.rank}</div>
    </div>`;
  }).join('');
}

// ── Winner ───────────────────────────────────────────────────────────────
function showWinner(msg) {
  const p = getPlayer(msg.player);
  el('winnerWord').textContent = msg.word.toUpperCase();
  el('winnerNickname').textContent = p.nickname || msg.player;
  el('winnerUsername').textContent = `@${msg.player}`;
  el('winnerAvatar').src = p.profilePic || '';
  el('winnerAvatar').style.display = p.profilePic ? 'block' : 'none';
  el('winnerGuessCount').textContent = msg.totalGuesses;

  const sess = el('winnerSession');
  if (msg.sessionScores && Object.keys(msg.sessionScores).length) {
    const sorted = Object.entries(msg.sessionScores).sort((a,b) => b[1]-a[1]).slice(0,8);
    sess.innerHTML = `<div class="w-session-title">Session Leaderboard</div><div class="w-session-list">` +
      sorted.map(([u, s]) => {
        const pp = getPlayer(u);
        return `<div class="w-session-item">
          ${pp.profilePic ? `<img src="${esc(pp.profilePic)}" alt="" onerror="this.style.display='none'">` : ''}
          <span class="name">${esc(pp.nickname||u)}</span>
          <span class="pts">${s}</span>
        </div>`;
      }).join('') + '</div>';
  } else {
    sess.innerHTML = '';
  }

  el('winnerOverlay').classList.add('active');
  launchConfetti();

  if (msg.nextRoundIn) {
    const secs = Math.ceil(msg.nextRoundIn / 1000);
    showTimer(secs);
    let rem = secs;
    const cd = el('winnerCountdown');
    cd.textContent = `Next word in ${rem}s`;
    // reuse the timer interval for winner countdown text
    const winInterval = setInterval(() => {
      rem--;
      if (rem <= 0) { clearInterval(winInterval); cd.textContent = 'Starting...'; }
      else cd.textContent = `Next word in ${rem}s`;
    }, 1000);
  }
}

function closeWinner() {
  el('winnerOverlay').classList.remove('active');
  hideTimer();
  skipRound();
}

// ── Confetti ─────────────────────────────────────────────────────────────
function launchConfetti() {
  const c = el('confetti'), ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const colors = ['#fe2c55','#ff6f3c','#ffd740','#00e5ff','#00c853','#e040fb','#b388ff'];
  const ps = Array.from({length:150}, () => ({
    x:Math.random()*c.width, y:Math.random()*c.height-c.height,
    w:Math.random()*8+3, h:Math.random()*5+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*5, vy:Math.random()*3+2,
    rot:Math.random()*360, vr:(Math.random()-.5)*12
  }));
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    let alive=false;
    for(const p of ps){p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.rot+=p.vr;if(p.y<c.height+20)alive=true;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}
    if(alive&&++f<350)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);
  })();
}

// ── Actions ──────────────────────────────────────────────────────────────
function sendHint() { wsSend({action:'hint'}); }
function skipRound() { wsSend({action:'newRound'}); }

function sendManual() {
  const input = el('manualInput');
  const val = input.value.trim();
  if (!val) return;
  input.value = '';
  let player = 'host', word = val;
  if (val.includes(':')) { const p = val.split(':'); player = p[0].trim()||'host'; word = p.slice(1).join(':').trim(); }
  if (/^[a-zA-Z]{2,20}$/.test(word)) {
    wsSend({action:'guess', word, player});
  }
}

// ── Init ─────────────────────────────────────────────────────────────────
wsConnect();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
